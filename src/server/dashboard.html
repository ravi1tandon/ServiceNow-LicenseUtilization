<div id="lic-dash" class="lic-dash">
  <style>
    .lic-dash { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #1b1b2f; padding: 16px; max-width: 1200px; margin: 0 auto; }
    .lic-dash h2 { margin: 0; font-size: 20px; }
    .lic-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; border-bottom: 1px solid #e3e3ec; padding-bottom: 12px; }
    .lic-sub { color: #6b6b80; font-size: 12px; margin-top: 2px; }
    .lic-btn { background: #2e2ea8; color: #fff; border: 0; border-radius: 6px; padding: 8px 14px; cursor: pointer; font-size: 13px; }
    .lic-btn:hover { background: #24248a; }
    .lic-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .lic-btn-ghost { background: #fff; color: #2e2ea8; border: 1px solid #c5c5e0; }
    .lic-btn-ghost:hover { background: #f0f0fb; }
    .lic-toast { margin-top: 10px; padding: 8px 12px; border-radius: 6px; font-size: 13px; background: #e6f7ec; color: #0a7d33; border: 1px solid #bfe6cc; }
    .lic-toast.err { background: #fdecea; color: #c0341d; border-color: #f3c0b4; }
    .lic-tabs { display: flex; gap: 4px; margin: 14px 0; flex-wrap: wrap; }
    .lic-tab { background: #f0f0f6; border: 0; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 13px; color: #4a4a63; }
    .lic-tab.active { background: #2e2ea8; color: #fff; }
    .lic-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 12px; }
    .lic-kpi { background: #fff; border: 1px solid #e3e3ec; border-radius: 10px; padding: 16px; }
    .lic-kpi .k-label { color: #6b6b80; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .lic-kpi .k-value { font-size: 28px; font-weight: 700; margin-top: 6px; }
    .lic-kpi .k-delta { font-size: 12px; margin-top: 4px; }
    .k-up { color: #0a7d33; }
    .k-down { color: #c0341d; }
    .lic-card { background: #fff; border: 1px solid #e3e3ec; border-radius: 10px; padding: 16px; margin-top: 12px; }
    .lic-card h3 { margin: 0 0 4px; font-size: 15px; }
    .lic-badge { display: inline-block; background: #eef; color: #2e2ea8; border-radius: 999px; padding: 2px 10px; font-size: 11px; margin-left: 6px; vertical-align: middle; }
    .lic-bar-wrap { background: #ececf4; border-radius: 6px; height: 10px; overflow: hidden; margin-top: 8px; }
    .lic-bar-fill { height: 10px; background: #4b4bd6; }
    .lic-bar-fill.warn { background: #e0a21a; }
    .lic-bar-fill.crit { background: #c0341d; }
    .lic-muted { color: #6b6b80; font-size: 12px; }
    .lic-legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; margin-top: 8px; }
    .lic-legend span { display: inline-flex; align-items: center; gap: 5px; }
    .lic-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
    table.lic-tbl { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
    table.lic-tbl th, table.lic-tbl td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #eee; }
    table.lic-tbl th { color: #6b6b80; font-weight: 600; }
  </style>

  <div class="lic-head">
    <div>
      <h2>License Utilization and Consumption</h2>
      <div class="lic-sub" id="lic-generated">Loading...</div>
    </div>
    <div class="lic-actions">
      <button type="button" class="lic-btn lic-btn-ghost" id="lic-csv">Export CSV</button>
      <button type="button" class="lic-btn lic-btn-ghost" id="lic-email">Email me</button>
      <button type="button" class="lic-btn lic-btn-ghost" id="lic-refresh-live" title="Recompute live from source and save (admin)">Refresh live</button>
      <button type="button" class="lic-btn" id="lic-refresh">Refresh</button>
    </div>
  </div>
  <div id="lic-toast" class="lic-toast" style="display:none"></div>

  <div class="lic-tabs">
    <button type="button" class="lic-tab active" data-tab="overview">Overview</button>
    <button type="button" class="lic-tab" data-tab="skus">By SKU</button>
    <button type="button" class="lic-tab" data-tab="trend">MoM Trending</button>
    <button type="button" class="lic-tab" data-tab="records">Source Records</button>
    <button type="button" class="lic-tab" data-tab="org">By Org / Dept</button>
  </div>

  <div id="lic-status" class="lic-muted">Loading dashboard data...</div>
  <div id="lic-panel-overview" class="lic-panel"></div>
  <div id="lic-panel-skus" class="lic-panel" style="display:none"></div>
  <div id="lic-panel-trend" class="lic-panel" style="display:none"></div>
  <div id="lic-panel-records" class="lic-panel" style="display:none"></div>
  <div id="lic-panel-org" class="lic-panel" style="display:none"></div>
</div>
